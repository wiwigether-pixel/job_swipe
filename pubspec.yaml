name: job_swipe
description: "A Tinder-like job seeking app MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  supabase_flutter: 2.3.4
  flutter_dotenv: ^5.1.0
  flutter_card_swiper: ^7.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.5
  dio: ^5.4.3
  logger: ^2.3.0
  image_picker: ^1.2.1
  slang_flutter: ^3.26.0
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  slang_build_runner: ^3.26.0

flutter:
  uses-material-design: true
  assets:
    - .env