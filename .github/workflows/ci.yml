name: CI/CD Pipeline

# 觸發條件：push 到 main 或發起 PR 時執行
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 全域環境變數
env:
  FLUTTER_VERSION: 'any'
  JAVA_VERSION: '17'

jobs:
  # ════════════════════════════════════════
  # Job 1：程式碼品質檢查與測試
  # ════════════════════════════════════════
  analyze_and_test:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐦 安裝 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 安裝依賴
        run: |
            flutter pub get
            touch .env

      - name: 🔨 執行程式碼生成 (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 靜態分析
        run: flutter analyze #--fatal-infos

      # 如果你目前還沒有寫測試，這步可能會報錯。
      # 若報錯，請在下面這行開頭加上 # 字號註解掉
      - name: 🧪 執行單元測試
        run: flutter test --coverage
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-key

  # ════════════════════════════════════════
  # Job 2：編譯 Web 版本 (修正 Base-Href)
  # ════════════════════════════════════════
  build_web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐦 安裝 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 安裝依賴
        run: flutter pub get

      - name: 🔨 執行程式碼生成
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🌐 編譯 Web（Release 模式）
        # 關鍵：加上 --base-href 確保在 GitHub Pages 子路徑下能抓到資源
        run: |
          flutter build web \
            --release \
            --base-href "/job_swipe/" \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: 📤 上傳 Web 產物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

  # ════════════════════════════════════════
  # Job 3：編譯 Android APK
  # ════════════════════════════════════════
  build_android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: ☕ 安裝 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 安裝 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 安裝依賴
        run: flutter pub get

      - name: 🔨 執行程式碼生成
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🤖 編譯 Android APK
        run: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: 📤 上傳 APK 產物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ════════════════════════════════════════
  # Job 4：自動部署到 GitHub Pages
  # ════════════════════════════════════════
  deploy_web:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 下載 Web 產物
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: ⚙️ 設定 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 上傳到 Pages 伺服器
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4